<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Participantes • Bolão Copa 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/bolao.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="https://flagcdn.com/br.svg">
</head>
<body>

  <nav class="bolao-nav py-3">
    <div class="container d-flex align-items-center justify-content-between">
      <a class="brand" href="index.html">Água Camelo <span>Bolão da Copa</span></a>
      <div class="d-flex gap-3">
        <a class="nav-link" href="index.html">Início</a>
        <a class="nav-link" href="palpites.html">Meus Palpites</a>
        <a class="nav-link" href="ranking.html">Ranking</a>
        <a class="nav-link active" href="participantes.html">Participantes</a>
        <a class="nav-link" href="admin.html">Admin</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div id="setup" class="setup-banner mb-4" style="display:none">
      ⚠️ <strong>Firebase ainda não configurado.</strong> Edite
      <code>bolao/js/firebase-config.js</code>. Veja o README.
    </div>

    <h3 class="fw-bold mb-1">🧑‍🤝‍🧑 Participantes</h3>
    <p class="muted" id="count">—</p>

    <div class="card-glass p-3 p-md-4 mt-3">
      <div id="list"><p class="muted mb-0">Carregando…</p></div>
    </div>
  </main>

  <footer class="container text-center muted py-4">
    <small>Entrou no bolão? Seu nome aparece aqui automaticamente.</small>
  </footer>

  <script type="module">
    import { isConfigured, onPlayers, onBets } from "./js/db.js";

    if (!isConfigured) document.getElementById("setup").style.display = "block";

    let players = {}, bets = {};
    onPlayers((p) => { players = p || {}; render(); });
    onBets((b) => { bets = b || {}; render(); });

    // Mostra sempre o nome; nunca o e-mail (se faltar nome, usa a parte antes do @).
    const safeName = (p) => {
      const n = (p && p.name) ? String(p.name) : "";
      if (n && !n.includes("@")) return n;
      const base = (n || (p && p.email) || "Participante").split("@")[0];
      return base.charAt(0).toUpperCase() + base.slice(1);
    };

    function render() {
      const list = document.getElementById("list");
      const rows = Object.entries(players).map(([uid, p]) => ({
        uid,
        name: safeName(p),
        palpites: Object.keys(bets[uid] || {}).length
      }));

      document.getElementById("count").textContent =
        rows.length === 0 ? "Ninguém entrou ainda."
        : `${rows.length} participante${rows.length > 1 ? "s" : ""} na brincadeira`;

      if (!rows.length) {
        list.innerHTML = `<p class="muted mb-0">Seja o primeiro! Entre na aba
          <a href="index.html">Início</a> com sua conta Água Camelo.</p>`;
        return;
      }

      rows.sort((a, b) => b.palpites - a.palpites || a.name.localeCompare(b.name));

      list.innerHTML = `
        <table class="rank-table">
          <thead><tr>
            <th>#</th><th>Participante</th>
            <th class="text-center">Palpites feitos</th>
          </tr></thead>
          <tbody>
          ${rows.map((r, i) => `
            <tr class="rank-row">
              <td class="rank-pos">${i + 1}</td>
              <td class="fw-bold">${r.name}</td>
              <td class="text-center">${r.palpites}</td>
            </tr>`).join("")}
          </tbody>
        </table>`;
    }
  </script>
</body>
</html>
